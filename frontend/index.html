<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="KOS - Sistema simples de atendimento e mensagens automáticas para computador e celular" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <title>KOS - Atendimentos e Mensagens</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('[PWA] Service Worker registered successfully:', reg.scope))
            .catch((err) => console.warn('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
